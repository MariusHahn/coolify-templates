services:
  passbolt:
    image: passbolt/passbolt:5.10.0-1-ce
    environment:
      - APP_FULL_BASE_URL=${SERVICE_URL_PASSBOLT}
      - DATASOURCES_DEFAULT_HOST=mariadb
      - DATASOURCES_DEFAULT_USERNAME=${SERVICE_USER_PASSBOLT}
      - DATASOURCES_DEFAULT_PASSWORD=${SERVICE_PASSWORD_PASSBOLT}
      - DATASOURCES_DEFAULT_DATABASE=${MYSQL_DB:-passbolt-db}
      - APP_DEFAULT_LOCALE=de_DE
      - APP_DEFAULT_TIMEZONE=Europe/Berlin
      - PASSBOLT_SECURITY_PROXIES_ACTIVE=true
      - EMAIL_DEFAULT_FROM_NAME=${PASSBOLT_MAIL_ADDRESS}
      - EMAIL_DEFAULT_FROM=${PASSBOLT_MAIL_ADDRESS}
      - EMAIL_TRANSPORT_DEFAULT_HOST=${PASSBOLT_MAIL_HOST}
      - EMAIL_TRANSPORT_DEFAULT_PORT=${PASSBOLT_MAIL_SMTP_PORT}
      - EMAIL_TRANSPORT_DEFAULT_USERNAME=${PASSBOLT_MAIL_ADDRESS}
      - EMAIL_TRANSPORT_DEFAULT_PASSWORD=${PASSBOLT_MAIL_PASSWORD}
      - EMAIL_TRANSPORT_DEFAULT_TLS=true
    volumes:
      - "gpg_volume:/etc/passbolt/gpg"
      - "jwt_volume:/etc/passbolt/jwt"
    command:
      - /usr/bin/wait-for.sh
      - "-t"
      - "0"
      - "mariadb:3306"
      - "--"
      - /docker-entrypoint.sh
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80"]
      interval: 5s
      timeout: 20s
      retries: 10

  mariadb:
    image: mariadb:11
    environment:
      - MARIADB_ROOT_PASSWORD=${SERVICE_PASSWORD_ROOTMARIADB}
      - MARIADB_DATABASE=${MYSQL_DB:-passbolt-db}
      - MARIADB_USER=${SERVICE_USER_PASSBOLT}
      - MARIADB_PASSWORD=${SERVICE_PASSWORD_PASSBOLT}
    volumes:
      - "passbolt_mariadb_data:/var/lib/mysql"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 20s
      retries: 10 